<section #childSection id="hero" class="hero section">
  <div class="container px-4 px-sm-0 px-lg-3" data-aos="fade-up" data-aos-delay="100">
    <div class="row mb-2">
      <div class="col-12 p-0">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h2>Panier</h2>
          <button class="btn-glass-secondary" (click)="back()">
            <i class="bi bi-arrow-left bi-bolder"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="row liquid-glass mb-4 gy-2 p-3 rounded-3">
      <!-- Panier vide -->
      @if (panier().achats.length === 0) {
        <div class="text-center py-5">
          <i class="bi bi-cart-x display-5 text-muted"></i>
          <p class="mt-3 text-muted">Votre panier est vide</p>
          <a [routerLink]="['/acheteur/all-boutiques']" class="btn-glass-secondary btn-sm mt-2">
            Continuer vos achats
          </a>
        </div>
      }

      <!-- Liste des articles -->
      @if (panier().achats.length > 0) {
        <div class="col-12 col-lg-8">
          <div class="d-flex justify-content-end align-items-center mb-4">
            <button class="btn-sm btn-glass-tertiary px-3 py-1" (click)="viderPanier()">
              Vider<i class="bi bi-trash ms-1"></i>
            </button>
          </div>

          @for (item of panier().achats; track trackByProduit($index, item)) {
            <app-panier-card
              [item]="item"
              (delete)="supprimerItem($event)"
            ></app-panier-card>
          }
        </div>

        <!-- Résumé -->
        <div class="col-12 col-lg-4">

          <div class="card shadow-sm border-0 sticky-top" style="top: 100px;">
            <div class="card-body">

              <h5 class="mb-3">Résumé</h5>

              <div class="d-flex justify-content-between mb-2">
                <span>Articles</span>
                <span>{{ totalArticles() }}</span>
              </div>

              <div class="d-flex justify-content-between mb-3">
                <span>Total</span>
                <span class="fw-bold text-warning">
                  {{ montantTotal() | currency:'MGA':'Ar ':'1.2-2' }}
                </span>
              </div>

              <button
                class="btn-glass w-100"
                (click)="validerAchat()">
                Valider l'achat
              </button>

            </div>
          </div>

        </div>

      }

    </div>
  </div>
</section>
