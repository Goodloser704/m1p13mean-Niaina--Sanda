<div class="card mb-3 shadow-sm border-0">
  <div class="card-body p-3">
    <div class="d-flex justify-content-between align-items-start">

      <!-- Infos produit -->
      <div class="d-flex align-items-center gap-3">

        <img
          [src]="item.photo ? item.photo : 'assets/img/story-set/shopping-bag.png'"
          width="60"
          height="60"
          class="rounded-2 object-fit-cover"
        />

        <div>
          <div class="fw-semibold">
            {{ item.nom }}
          </div>

          <div class="small text-muted">
            {{ item.prixUnitaire | currency:'MGA':'Ar ':'1.2-2' }}
            × {{ item.quantite }}
          </div>

          <!-- Badge type achat -->
          <span
            class="badge small mt-1"
            [ngClass]="{
              'bg-primary': item.typeAchat === 'Livrer',
              'bg-success': item.typeAchat === 'Recuperer'
            }"
          >
            {{ item.typeAchat }}
          </span>

        </div>
      </div>

      <!-- Prix ligne + delete -->
      <div class="text-end">

        <div class="fw-bold text-warning">
          {{ item.montantLigne | currency:'MGA':'Ar ':'1.2-2' }}
        </div>

        <button
          class="btn btn-sm btn-link text-danger px-2 py-1 mt-2"
          (click)="onDelete(item.produitId, item.typeAchat)">
          <i class="bi bi-trash fs-5"></i>
        </button>

      </div>

    </div>

  </div>
</div>
