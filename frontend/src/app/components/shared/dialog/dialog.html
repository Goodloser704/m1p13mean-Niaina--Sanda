<div class="floating-container-darker">
  <div class="dialog-card glass">
    <p class="dialog-title mb-3">{{ dialog }}</p>
    <div class="w-100 d-flex justify-content-center">
      <button class="btn-glass me-3" (click)="onChoose(true)">Yes</button>
      <button class="btn-glass-secondary" (click)="onChoose(false)">No</button>
    </div>
  </div>
</div>
